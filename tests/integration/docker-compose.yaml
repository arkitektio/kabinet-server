
services:
   db:
      image: jhnnsrs/daten:dev
      # Throwaway test DB: trade durability for speed (flush/TRUNCATE per test)
      command: postgres -c fsync=off -c synchronous_commit=off -c full_page_writes=off
      environment:
         POSTGRES_MULTIPLE_DATABASES: testdb
         POSTGRES_PASSWORD: test
         POSTGRES_USER: test
      labels:
         - fakts.service=live.arkitekt.postgres
      ports:
        - 5555:5432
   minio:
      command: server /data
      environment:
         MINIO_ROOT_PASSWORD: e8821a29d189789e39c9922a3bfcfb4a
         MINIO_ROOT_USER: crappygreysetter
      image: minio/minio:RELEASE.2025-02-18T16-25-55Z
      ports:
         - 6890:9000
   initc:
      depends_on:
         minio:
            condition: service_started
      environment:
         MINIO_HOST: http://minio:9000
         MINIO_ROOT_PASSWORD: e8821a29d189789e39c9922a3bfcfb4a
         MINIO_ROOT_USER: crappygreysetter
      image: jhnnsrs/init:dev
      volumes:
         - ./configs/minio.yaml:/workspace/config.yaml
   redis:
      environment:
         REDIS_HOST: redis
         REDIS_PORT: 6379
      image: redis
      ports:
         - 6666:6379

volumes:
   chroma_data:
